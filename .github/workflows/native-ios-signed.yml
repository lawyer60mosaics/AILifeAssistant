name: Native iOS Signed Build

on:
  workflow_dispatch:

jobs:
  ios-signed:
    name: iOS Signed IPA
    runs-on: macos-15
    if: ${{ vars.IOS_SIGNED_BUILD_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: apps/native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/build_profile.mobileprovision"

      - name: Archive signed app
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        shell: bash
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "AI Minutes" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/AI-Minutes.xcarchive \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            archive

      - name: Create export options
        env:
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'development' }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        shell: bash
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${IOS_DEVELOPMENT_TEAM}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aiminutes.collector</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        shell: bash
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/AI-Minutes.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ai-minutes-ios-signed-ipa
          path: apps/native/build/export/*.ipa
          if-no-files-found: error

