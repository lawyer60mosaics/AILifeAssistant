name: Native Mobile Build

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/native/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Compile Android Kotlin
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew :app:compileDebugKotlin --no-daemon

      - name: Build debug APK
        shell: bash
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Prepare release APK
        shell: bash
        run: |
          mkdir -p build/release
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "build/release/AI-Minutes-${VERSION}-android-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-minutes-android-debug-apk
          path: apps/native/build/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: AI Minutes ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          files: apps/native/build/release/*.apk
          body: |
            Android debug build for AI Minutes.

            Notes:
            - Android includes native AudioRecord PCM16 capture.
            - iOS packaging is intentionally deferred until Android runtime validation is complete.
