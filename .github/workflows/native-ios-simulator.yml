name: Native iOS Simulator Build

on:
  workflow_dispatch:

jobs:
  ios-simulator:
    name: iOS Simulator Build
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build simulator app
        shell: bash
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "AI Minutes" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ai-minutes-ios-simulator-app
          path: apps/native/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error

